<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Barcode → Excel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --accent: #4f8cff;
    --text: #eef1f6;
    --muted: #9aa3b2;
    --good: #2ecc71;
    --bad: #ff6b6b;
    --border: #2a2e38;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 480px;
    margin-inline: auto;
  }
  h1 { font-size: 20px; margin: 4px 0 16px; text-align: center; }
  #videoWrap {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
    aspect-ratio: 4 / 3;
  }
  video#preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .status {
    text-align: center;
    margin: 10px 0;
    color: var(--muted);
    font-size: 14px;
    min-height: 20px;
  }
  .status.error { color: var(--bad); font-weight: 600; }
  .row { display: flex; gap: 8px; margin: 12px 0; }
  button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.primary { background: var(--accent); color: white; border: none; }
  button.capture {
    background: var(--good);
    color: #06210f;
    font-size: 18px;
    padding: 18px;
  }
  button:active { opacity: 0.8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #count { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  #version { text-align: center; color: var(--muted); font-size: 11px; margin-top: 16px; opacity: 0.6; }
  ul#log {
    list-style: none;
    padding: 0;
    margin: 8px 0 0;
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  ul#log li {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    justify-content: space-between;
  }
  ul#log li:last-child { border-bottom: none; }
  ul#log li span.del { color: var(--bad); cursor: pointer; font-weight: bold; padding-left: 10px; }

  /* Big success/failure banner */
  #banner {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    text-align: center;
    padding: 24px;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  #banner.show { opacity: 1; }
  #banner.success { background: rgba(46, 204, 113, 0.96); color: #06210f; }
  #banner.failure { background: rgba(255, 107, 107, 0.96); color: #2b0b0b; }
  #banner .icon { font-size: 72px; line-height: 1; }
  #banner .code { font-size: 26px; font-weight: 700; word-break: break-all; }
  #banner .sub { font-size: 15px; opacity: 0.85; }

  #hidden-file-reader {
    position: absolute;
    top: -9999px;
    left: -9999px;
    width: 640px;
    height: 480px;
    overflow: hidden;
  }
</style>
</head>
<body>
  <h1>Barcode → Excel</h1>

  <div id="videoWrap">
    <video id="preview" autoplay muted playsinline></video>
  </div>
  <div class="status" id="status">Tap "Start Camera" to begin</div>

  <div class="row">
    <button class="primary" id="startBtn">📷 Start Camera</button>
  </div>
  <div class="row">
    <button class="capture" id="captureBtn" disabled>📸 Capture &amp; Decode</button>
  </div>
  <div class="row">
    <button class="primary" id="downloadBtn">⬇️ Download .xlsx</button>
    <button id="refreshBtn">🔄 Refresh list</button>
  </div>
  <div class="row">
    <button id="updateBtn">🔁 Check for Update</button>
  </div>

  <div id="count">0 entries</div>
  <ul id="log"></ul>
  <div id="version"></div>
  <div id="hidden-file-reader"></div>

  <div id="banner">
    <div class="icon" id="bannerIcon"></div>
    <div class="code" id="bannerCode"></div>
    <div class="sub" id="bannerSub"></div>
  </div>

<script src="config.js"></script>
<script>
  // Bump this string whenever the app is updated — makes it easy to confirm
  // you're looking at the latest deployed version.
  const APP_VERSION = '2026-07-14.4';

  const statusEl = document.getElementById('status');
  const logEl = document.getElementById('log');
  const countEl = document.getElementById('count');
  const versionEl = document.getElementById('version');
  versionEl.textContent = 'Version ' + APP_VERSION;

  window.addEventListener('error', (e) => {
    if (statusEl) {
      statusEl.textContent = 'Script error: ' + e.message;
      statusEl.className = 'status error';
    }
  });

  let supabaseClient;
  try {
    if (typeof SUPABASE_URL === 'undefined' || typeof SUPABASE_ANON_KEY === 'undefined') {
      throw new Error('config.js did not define SUPABASE_URL / SUPABASE_ANON_KEY');
    }
    if (!window.supabase) {
      throw new Error('Supabase library failed to load (check network/CDN access)');
    }
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    statusEl.textContent = 'Setup error: ' + e.message;
    statusEl.className = 'status error';
    throw e;
  }

  const TABLE = 'scans';
  let entries = []; // [{id, code}]

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (cls ? ' ' + cls : '');
  }

  function render() {
    logEl.innerHTML = '';
    entries.slice().reverse().forEach(row => {
      const li = document.createElement('li');
      li.innerHTML = `<span>${row.code}</span><span class="del" data-id="${row.id}">✕</span>`;
      logEl.appendChild(li);
    });
    countEl.textContent = entries.length + ' entries';
  }

  async function loadEntries() {
    const { data, error } = await supabaseClient
      .from(TABLE)
      .select('id, code, created_at')
      .order('created_at', { ascending: true });
    if (error) {
      setStatus('Load error: ' + error.message, 'error');
      return;
    }
    entries = data;
    render();
  }

  logEl.addEventListener('click', async (e) => {
    if (e.target.classList.contains('del')) {
      const id = e.target.dataset.id;
      const { error } = await supabaseClient.from(TABLE).delete().eq('id', id);
      if (error) { setStatus('Delete failed: ' + error.message, 'error'); return; }
      entries = entries.filter(r => String(r.id) !== String(id));
      render();
    }
  });

  document.getElementById('refreshBtn').addEventListener('click', loadEntries);

  // ---- Big success/failure banner ----
  const bannerEl = document.getElementById('banner');
  const bannerIcon = document.getElementById('bannerIcon');
  const bannerCode = document.getElementById('bannerCode');
  const bannerSub = document.getElementById('bannerSub');
  let bannerTimeout;

  function showBanner(success, mainText, subText) {
    clearTimeout(bannerTimeout);
    bannerEl.className = 'banner show ' + (success ? 'success' : 'failure');
    bannerIcon.textContent = success ? '✅' : '⚠️';
    bannerCode.textContent = mainText;
    bannerSub.textContent = subText || '';
    bannerTimeout = setTimeout(() => {
      bannerEl.classList.remove('show');
    }, success ? 1400 : 1800);
  }

  // ---- Camera preview (no continuous scanning) ----
  const videoEl = document.getElementById('preview');
  const startBtn = document.getElementById('startBtn');
  const captureBtn = document.getElementById('captureBtn');
  let stream = null;

  startBtn.addEventListener('click', async () => {
    if (!window.isSecureContext) {
      setStatus('Camera blocked: page is not served over HTTPS.', 'error');
      return;
    }
    setStatus('Requesting camera permission…');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          advanced: [{ focusMode: "continuous" }]
        },
        audio: false
      });
      videoEl.srcObject = stream;
      captureBtn.disabled = false;
      setStatus('Camera ready — line up the barcode and tap Capture');
    } catch (err) {
      setStatus('Camera error: ' + (err.message || err), 'error');
    }
  });

  // A hidden Html5Qrcode instance used purely for decoding a still image,
  // never attached to the live camera stream.
  const fileScanner = new Html5Qrcode("hidden-file-reader", {
    formatsToSupport: [
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.UPC_EAN_EXTENSION,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.PDF_417
    ],
    verbose: false
  });

  captureBtn.addEventListener('click', async () => {
    if (!stream) return;
    captureBtn.disabled = true;
    setStatus('Decoding…');

    const canvas = document.createElement('canvas');
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(async (blob) => {
      // The captured frame lives only in memory as this Blob — it is never
      // written to device storage, uploaded, or saved anywhere. Once this
      // function finishes, the Blob and canvas are discarded automatically.
      if (!blob) {
        showBanner(false, 'Capture failed', 'Could not read frame from camera');
        setStatus('Camera ready — line up the barcode and tap Capture');
        captureBtn.disabled = false;
        return;
      }

      const file = new File([blob], 'capture.png', { type: 'image/png' });

      try {
        const result = await fileScanner.scanFileV2(file, /* showImage= */ false);
        const code = result.decodedText;

        const { data, error } = await supabaseClient
          .from(TABLE)
          .insert({ code })
          .select()
          .single();

        if (error) {
          showBanner(false, 'Save failed', error.message);
        } else {
          entries.push(data);
          render();
          showBanner(true, code, 'Added to spreadsheet');
        }
      } catch (decodeErr) {
        showBanner(false, 'No barcode detected', 'Try again — get closer or reduce glare');
      } finally {
        setStatus('Camera ready — line up the barcode and tap Capture');
        captureBtn.disabled = false;
      }
    }, 'image/png');
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const ws = XLSX.utils.aoa_to_sheet(entries.map(r => [r.code]));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Barcodes');
    XLSX.writeFile(wb, 'barcodes.xlsx');
  });

  document.getElementById('updateBtn').addEventListener('click', async () => {
    setStatus('Checking for update…');
    try {
      const bustUrl = location.pathname + '?_=' + Date.now();
      const res = await fetch(bustUrl, { cache: 'no-store' });
      const html = await res.text();
      const match = html.match(/const APP_VERSION = '([^']+)'/);
      const liveVersion = match ? match[1] : null;

      if (!liveVersion) {
        setStatus('Could not read version from live page.', 'error');
        return;
      }
      if (liveVersion === APP_VERSION) {
        setStatus('You already have the latest version (' + APP_VERSION + ').');
        return;
      }
      setStatus('Update found (' + liveVersion + ') — reloading…');
      setTimeout(() => {
        window.location.href = bustUrl;
      }, 800);
    } catch (e) {
      setStatus('Update check failed: ' + e.message, 'error');
    }
  });

  loadEntries();

  // Live updates if you scan from multiple devices/sessions
  supabaseClient
    .channel('scans-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, loadEntries)
    .subscribe();
</script>
</body>
</html>
